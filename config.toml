enable-magisk-update = false   # set this to false if you do not want to receive updates for the module in magisk app

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config
[YouTube]
build-mode = "apk"
#version = "latest"
version = "auto"
patches-source = "revanced/revanced-patches" # where to fetch patches bundle from. default: "revanced/revanced-patches"
integrations-source = "revanced/revanced-integrations" # where to fetch integrations from. default: "revanced/revanced-integrations"
cli-source = "j-hc/revanced-cli" # where to fetch cli from. default: "j-hc/revanced-cli"
rv-brand = "JYouTube" # rebrand from 'ReVanced' to something different. default: "ReVanced"
included-patches = "'Custom branding'"
excluded-patches = "'Spoof device dimensions' 'Open links externally' 'HDR auto brightness' 'Restore old video quality menu' 'Disable precise seeking gesture' 'Remove viewer discretion dialog' 'Restore old seekbar thumbnails' 'Enable tablet layout' 'Wide searchbar' 'Tablet mini player' 'Custom player overlay opacity' 'Alternative thumbnails' 'Hide seekbar' 'Comments' 'Hide Shorts components' 'Hide floating microphone button'"
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
apkmirror-arch = "arm64-v8a"
arch = "arm64-v8a"

